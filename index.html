                  <Field label="Edad" value={clientForm.age} onChange={v=>setClientForm(p=>({...p,age:v}))} type="number"/>
                  <Field label="Género" value={clientForm.gender} onChange={v=>setClientForm(p=>({...p,gender:v}))} as="select" options={['Male','Female']}/>
                  <Field label="Altura" value={clientForm.height_cm} onChange={v=>setClientForm(p=>({...p,height_cm:v}))} type="number" unit="cm"/>
                  <Field label="Trainer asignado" value={clientForm.trainer} onChange={v=>setClientForm(p=>({...p,trainer:v}))}/>
                  <Field label="Categoría" value={clientForm.category} onChange={v=>setClientForm(p=>({...p,category:v}))} as="select" options={['BURNT','HYPERT','RESET']}/>
                  <Field label="Membresía" value={clientForm.membership} onChange={v=>setClientForm(p=>({...p,membership:v}))} as="select" options={['Premium','Standard','Trial']}/>
                  <Field label="Objetivo principal" value={clientForm.goal} onChange={v=>setClientForm(p=>({...p,goal:v}))}/>
                </div>
                <Field label="Notas" value={clientForm.notes} onChange={v=>setClientForm(p=>({...p,notes:v}))} as="textarea"/>
                <div className="footer-actions">
                  <button className="btn" onClick={()=>setClientForm(emptyClient())}>Nuevo cliente</button>
                  <button className="btn primary" onClick={saveClient}>Guardar</button>
                </div>
              </div>
            </div>
            {/* Assessment history */}
            <div className="card">
              <div className="card-head"><h3>Historial de evaluaciones</h3><span className="small">{clientAssessments.length} sesiones</span></div>
              <div className="card-body">
                {!clientAssessments.length?<div className="empty">Sin evaluaciones aún.</div>
                :<div className="alist">{[...clientAssessments].reverse().map(a=><div key={a.assessment_id} className={`arow ${assessId===a.assessment_id?'active':''}`} onClick={()=>{setAssessId(a.assessment_id);setAssessForm(clone(a));}}>
                  <div className="status-row" style={{justifyContent:'space-between'}}><strong>{a.assessment_type}</strong><span className={`badge ${String(a.category_final||'HYPERT').toLowerCase()}`}>{a.category_final}</span></div>
                  <div className="small">{fmt(a.assessment_date)} · {a.status}{a.is_draft?' · draft':''}</div>
                  <div className="footer-actions" style={{marginTop:8}}>
                    <button className="btn" onClick={e=>{e.stopPropagation();setAssessForm(clone(a));window.location.hash='/entry';}}>Editar</button>
                    <button className="btn" onClick={e=>{e.stopPropagation();setAssessId(a.assessment_id);window.location.hash='/review';}}>Review</button>
                    <button className="btn danger" onClick={e=>{e.stopPropagation();deleteAssessment(a.assessment_id);}}>✕ Borrar</button>
                  </div>
                </div>)}</div>}
              </div>
            </div>
          </div>
        </>}

        {/* ═══ ENTRY ═══ */}
        {route==='/entry'&&selectedClient&&assessForm&&<>
          <div className="card fade-up hero-copy">
            <div className="eyebrow">TEVA Entry · {assessForm.assessment_type}</div>
            <h2>{selectedClient.name}</h2>
            <p>Captura por bloques en el orden del Body Blueprint. Cada bloque se guarda individualmente en Google Sheets.</p>
            <div className="hero-meta">
              {[['Fecha',fmt(assessForm.assessment_date)],['Coach',assessForm.coach||'—'],['Tipo',assessForm.assessment_type],['Estado',assessForm.status]].map(([k,v])=><div key={k} className="mini"><div className="k">{k}</div><div className="v">{v}</div></div>)}
            </div>
          </div>
          <div className="card fade-up">
            <div className="card-head"><h3>Secciones</h3><span className="small">Body Blueprint flow</span></div>
            <div className="card-body">
              <div className="subtabs" style={{marginBottom:14}}>
                {[['vitals','1. Vitals'],['body','2. Body Comp'],['segmental','Segmental'],['mobility','3. Yogger'],['vo2','4. VO₂max'],['strength','5. Handgrip'],['functional','6. Endurance'],['targets','7. Targets'],['direction','Direction']].map(([k,l])=><button key={k} className={`subtab ${entryTab===k?'active':''}`} onClick={()=>setEntryTab(k)}>{l}</button>)}
              </div>

              {/* 1. VITALS */}
              {entryTab==='vitals'&&<div className="fg2">
                <Field label="Fecha" value={assessForm.assessment_date} onChange={v=>setA('assessment_date',v)} type="date"/>
                <Field label="Tipo de evaluación" value={assessForm.assessment_type} onChange={v=>setA('assessment_type',v)} as="select" options={['Initial BBP','Follow-up','Review 4 semanas','Re-assessment']}/>
                <Field label="Coach" value={assessForm.coach} onChange={v=>setA('coach',v)}/>
                <Field label="Categoría" value={assessForm.category_final} onChange={v=>setA('category_final',v)} as="select" options={['BURNT','HYPERT','RESET']}/>
                <Field label="Resting HR" value={assessForm.vitals.resting_hr_bpm} onChange={v=>setA('vitals.resting_hr_bpm',v)} type="number" unit="bpm"/>
                <Field label="Sistólica" value={assessForm.vitals.systolic} onChange={v=>setA('vitals.systolic',v)} type="number" unit="mmHg"/>
                <Field label="Diastólica" value={assessForm.vitals.diastolic} onChange={v=>setA('vitals.diastolic',v)} type="number" unit="mmHg"/>
                {assessForm.vitals.bp_classification&&<div className={`valid-badge ${assessForm.vitals.bp_classification==='Normal'?'valid-ok':'valid-ko'}`}>BP: {assessForm.vitals.bp_classification}</div>}
              </div>}

              {/* 2. BODY COMP */}
              {entryTab==='body'&&<div className="fg2">
                {[['weight_kg','Peso','kg'],['skeletal_muscle_kg','Músculo esquelético','kg'],['body_fat_pct','Grasa corporal','%'],['body_fat_mass_kg','Masa grasa','kg'],['lean_mass_kg','Masa magra','kg'],['bio_age','Bio Age','años'],['bwi_score','BWI','/10'],['bmr_kcal','BMR','kcal'],['tee_kcal','TEE','kcal'],['total_water_kg','Agua total','kg'],['subcutaneous_fat_kg','Grasa subcut.','kg'],['visceral_fat_level','Grasa visceral nivel',''],['visceral_fat_area_cm2','Área visceral','cm²'],['visceral_fat_mass_kg','Masa visceral','kg'],['protein_kg','Proteína','kg'],['mineral_kg','Mineral','kg'],['abdominal_circ_cm','Circ. abd.','cm'],['waist_hip_ratio','Cintura/Cadera','']].map(([k,l,u])=><Field key={k} label={l} value={assessForm.body[k]} onChange={v=>setA(`body.${k}`,v)} type="number" unit={u}/>)}
              </div>}

              {/* SEGMENTAL */}
              {entryTab==='segmental'&&(()=>{
                // Auto-calc % vs normal from lean + ref range
                const calcPct=(lean,low,high)=>{
                  const v=parseFloat(lean),l=parseFloat(low),h=parseFloat(high);
                  if(isNaN(v)||isNaN(l)||isNaN(h)||l===0&&h===0)return null;
                  const mid=(l+h)/2;
                  return mid>0?+((v-mid)/mid*100).toFixed(1):null;
                };
                const pctState=p=>p==null?'—':p<=-10?'Under':p>=10?'Over':'Normal';
                const pctColor=p=>p==null?'var(--soft)':p<=-10?'#f08f82':p>=10?'#f0c164':'#9fe0c5';
                return <div>
                  <div className="small" style={{marginBottom:12,color:'var(--muted)'}}>
                    Ingresa el valor del cliente y el rango de referencia del reporte Evolt. El % vs normal y estado se calculan automáticamente.
                  </div>
                  <div style={{display:'grid',gap:14}}>
                    {[['left_arm','Brazo Izquierdo'],['right_arm','Brazo Derecho'],['trunk','Tronco'],['left_leg','Pierna Izquierda'],['right_leg','Pierna Derecha']].map(([zone,label])=>{
                      const z=assessForm.segmental[zone];
                      const pct=calcPct(z.lean,z.ref_lean_low,z.ref_lean_high);
                      const state=pctState(pct);
                      const col=pctColor(pct);
                      // Update state in form when pct changes
                      if(pct!==null&&z.pct_vs_normal!==pct){
                        setTimeout(()=>{
                          setA(`segmental.${zone}.pct_vs_normal`,pct);
                          setA(`segmental.${zone}.state`,state==='—'?'Normal':state);
                        },0);
                      }
                      return <div key={zone} className="card" style={{background:'rgba(255,255,255,.02)'}}>
                        <div className="card-head" style={{padding:'10px 14px'}}>
                          <h3 style={{fontSize:13}}>{label}</h3>
                          {pct!==null&&<div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontSize:18,fontWeight:700,color:col,fontFamily:"'Playfair Display',serif"}}>{pct>0?'+':''}{pct}%</span>
                            <span style={{fontSize:10,padding:'2px 8px',borderRadius:999,background:`${col}22`,color:col,fontWeight:700}}>{state}</span>
                          </div>}
                        </div>
                        <div className="card-body" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                          <div style={{gridColumn:'1/-1',borderBottom:'1px solid var(--line)',paddingBottom:10,marginBottom:4}}>
                            <div className="flabel" style={{marginBottom:6}}>Masa Muscular (Lean)</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                              <Field label="Valor cliente" value={z.lean} onChange={v=>setA(`segmental.${zone}.lean`,v)} type="number" unit="kg"/>
                              <Field label="Ref. mín" value={z.ref_lean_low} onChange={v=>setA(`segmental.${zone}.ref_lean_low`,v)} type="number" unit="kg"/>
                              <Field label="Ref. máx" value={z.ref_lean_high} onChange={v=>setA(`segmental.${zone}.ref_lean_high`,v)} type="number" unit="kg"/>
                            </div>
                          </div>
                          <div style={{gridColumn:'1/-1'}}>
                            <div className="flabel" style={{marginBottom:6}}>Grasa (Fat)</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                              <Field label="Valor cliente" value={z.fat} onChange={v=>setA(`segmental.${zone}.fat`,v)} type="number" unit="kg"/>
                              <Field label="Ref. mín" value={z.ref_fat_low} onChange={v=>setA(`segmental.${zone}.ref_fat_low`,v)} type="number" unit="kg"/>
                              <Field label="Ref. máx" value={z.ref_fat_high} onChange={v=>setA(`segmental.${zone}.ref_fat_high`,v)} type="number" unit="kg"/>
                            </div>
                          </div>
                        </div>
                      </div>;
                    })}
                  </div>
                  <div className="fg2" style={{marginTop:12}}>
                    <Field label="Balance U/L" value={assessForm.balance_ul} onChange={v=>setA('balance_ul',v)} as="select" options={['Balanced','Unbalanced']}/>
                    <Field label="Balance L/R" value={assessForm.balance_lr} onChange={v=>setA('balance_lr',v)} as="select" options={['Balanced','Unbalanced']}/>
                  </div>
                </div>;
              })()}

              {/* 3. YOGGER */}
              {entryTab==='mobility'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="g4">
                  {[
                    ['Movement Score', assessForm.mobility.movement_score, '/100', 'Ponderado: OHS×30% + SLS×30% + Lunge×25% + Flex×15%'],
                    ['Stability Score', assessForm.mobility.stability_score, '/100', 'Promedio SLS + Lunge (control unilateral)'],
                    ['Mobility Score', assessForm.mobility.mobility_score, '/100', 'Promedio OHS + Standing Flex (rango articular)'],
                    ['Asymmetry Index', assessForm.mobility.asymmetry_index, '%', 'Asimetría L/R del Forward Lunge'],
                  ].map(([label,val,unit,tip])=><div key={label} className="metric">
                    <div className="label">{label}</div>
                    <div className="value" style={{color:val?'#9fe0c5':'var(--soft)',fontSize:'clamp(20px,1.8vw,30px)'}}>
                      {val||'—'}<span style={{fontSize:10,color:'var(--soft)',marginLeft:3}}>{val?unit:''}</span>
                    </div>
                    <div style={{fontSize:9,color:'var(--soft)',marginTop:4,lineHeight:1.5}}>{tip}</div>
                  </div>)}
                </div>
                <div className="diag" style={{padding:'10px 14px'}}>
                  <div className="eyebrow" style={{marginBottom:4}}>Auto-calculado</div>
                  <p style={{fontSize:11}}>Los scores se calculan automáticamente al ingresar los resultados de los tests. Ingresa primero los scores individuales de cada prueba abajo.</p>
                </div>
                <div className="g2">
                  {[['overhead_squat','Overhead Squat (OHS)'],['single_leg_squat','Single-Leg Squat (SLS)'],['forward_lunge','Forward Lunge'],['standing_flexion','Standing Flexion Trunk']].map(([k,label])=><div key={k} className="card">
                    <div className="card-head"><h3>{label}</h3></div>
                    <div className="card-body" style={{display:'flex',flexDirection:'column',gap:8}}>
                      <Field label="Score" value={assessForm.mobility.tests[k]?.score||''} onChange={v=>setA(`mobility.tests.${k}.score`,v)} type="number" unit="/100"/>
                      {k==='forward_lunge'&&<><Field label="Score Left" value={assessForm.mobility.tests[k].score_l||''} onChange={v=>setA(`mobility.tests.${k}.score_l`,v)} type="number"/><Field label="Score Right" value={assessForm.mobility.tests[k].score_r||''} onChange={v=>setA(`mobility.tests.${k}.score_r`,v)} type="number"/><Field label="Asimetría" value={assessForm.mobility.tests[k].asym||''} onChange={v=>setA(`mobility.tests.${k}.asym`,v)} type="number" unit="%"/></>}
                      <Field label="Notas" value={assessForm.mobility.tests[k]?.notes||''} onChange={v=>setA(`mobility.tests.${k}.notes`,v)} as="textarea"/>
                    </div>
                  </div>)}
                </div>
              </div>}

              {/* 4. CALIBRE VO2MAX */}
              {entryTab==='vo2'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="fg2">
                  <Field label="Protocolo" value={assessForm.vo2.protocol} onChange={v=>setA('vo2.protocol',v)}/>
                  <Field label="Duración" value={assessForm.vo2.duration_s} onChange={v=>setA('vo2.duration_s',v)} type="number" unit="min"/>
                  <Field label="Peak HR" value={assessForm.vo2.peak_hr_bpm} onChange={v=>setA('vo2.peak_hr_bpm',v)} type="number" unit="bpm"/>
                  <Field label="Avg HR" value={assessForm.vo2.avg_hr_bpm} onChange={v=>setA('vo2.avg_hr_bpm',v)} type="number" unit="bpm"/>
                  <Field label="Peak VO₂/kg" value={assessForm.vo2.peak_vo2_ml_kg} onChange={v=>setA('vo2.peak_vo2_ml_kg',v)} type="number" unit="ml/kg/min"/>
                  <Field label="Avg VO₂/kg" value={assessForm.vo2.avg_vo2_ml_kg} onChange={v=>setA('vo2.avg_vo2_ml_kg',v)} type="number" unit="ml/kg/min"/>
                  <Field label="Peak VO₂ abs" value={assessForm.vo2.peak_vo2_L} onChange={v=>setA('vo2.peak_vo2_L',v)} type="number" unit="L/min"/>
                  <Field label="Peak VCO₂" value={assessForm.vo2.peak_vco2} onChange={v=>setA('vo2.peak_vco2',v)} type="number" unit="L/min"/>
                  <Field label="Peak RER" value={assessForm.vo2.peak_rer} onChange={v=>setA('vo2.peak_rer',v)} type="number"/>
                  <Field label="Avg RER" value={assessForm.vo2.avg_rer} onChange={v=>setA('vo2.avg_rer',v)} type="number"/>
                  <Field label="Peak VE" value={assessForm.vo2.peak_ve} onChange={v=>setA('vo2.peak_ve',v)} type="number" unit="L/min"/>
                  <Field label="Peak METs" value={assessForm.vo2.peak_mets} onChange={v=>setA('vo2.peak_mets',v)} type="number"/>
                  <Field label="Calorías quemadas" value={assessForm.vo2.calories} onChange={v=>setA('vo2.calories',v)} type="number" unit="kcal"/>
                  <Field label="VO₂max Calibre (reporte)" value={assessForm.vo2.vo2max_calibre} onChange={v=>setA('vo2.vo2max_calibre',v)} type="number" unit="ml/kg/min"/>
                </div>
                {/* Validation status */}
                {vo2Valid&&<div className="diag">
                  <div className="eyebrow">Validación de la prueba</div>
                  <div className="status-row" style={{marginTop:8,gap:12}}>
                    <span className={`valid-badge ${vo2Valid.rerOk?'valid-ok':'valid-ko'}`}>RER {vo2Valid.rerOk?'≥':'<'} 1.10 — {vo2Valid.rerOk?'OK':'No cumple'}</span>
                    <span className={`valid-badge ${vo2Valid.hrOk?'valid-ok':'valid-ko'}`}>HR ≥ 85% HRmax — {vo2Valid.hrOk?'OK':'No cumple'}</span>
                    <span className={`valid-badge ${vo2Valid.valid?'valid-ok':'valid-ko'}`}>{vo2Valid.valid?'PRUEBA VÁLIDA — usar valor Calibre':'PRUEBA INVÁLIDA — usar estimado'}</span>
                  </div>
                  {!vo2Valid.valid&&<div className="small" style={{marginTop:8}}>Ingresa un VO₂max estimado (Rockport, sub-máximo, o protocolo alternativo).</div>}
                </div>}
                <div className="fg2">
                  <Field label="VO₂max Estimado (si inválido)" value={assessForm.vo2.vo2max_estimated} onChange={v=>setA('vo2.vo2max_estimated',v)} type="number" unit="ml/kg/min"/>
                  <Field label="Fuente" value={assessForm.vo2.vo2max_source} onChange={v=>setA('vo2.vo2max_source',v)} as="select" options={['device','estimated','submaximal','rockport']}/>
                </div>
                {assessForm.vo2.vo2max_final&&<div className="metric"><div className="label">VO₂max Final (auto-calculado)</div><div className="value" style={{color:'#D4901A'}}>{assessForm.vo2.vo2max_final} ml/kg/min</div></div>}
              </div>}

              {/* 5. HANDGRIP */}
              {entryTab==='strength'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="g2">
                  <div className="card">
                    <div className="card-head"><h3>Mano Izquierda</h3></div>
                    <div className="card-body" style={{display:'flex',flexDirection:'column',gap:8}}>
                      {['l1','l2','l3'].map((k,i)=><Field key={k} label={`Intento ${i+1}`} value={assessForm.strength[`grip_L${k}`]} onChange={v=>setA(`strength.grip_L${k}`,v)} type="number" unit="kg"/>)}
                      {assessForm.strength.grip_L_avg!=null&&<div className="metric"><div className="label">Promedio L</div><div className="value" style={{color:'#2D7A5E'}}>{assessForm.strength.grip_L_avg} kg</div></div>}
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-head"><h3>Mano Derecha</h3></div>
                    <div className="card-body" style={{display:'flex',flexDirection:'column',gap:8}}>
                      {['l1','l2','l3'].map((k,i)=><Field key={k} label={`Intento ${i+1}`} value={assessForm.strength[`grip_R${k}`]} onChange={v=>setA(`strength.grip_R${k}`,v)} type="number" unit="kg"/>)}
                      {assessForm.strength.grip_R_avg!=null&&<div className="metric"><div className="label">Promedio R</div><div className="value" style={{color:'#2D7A5E'}}>{assessForm.strength.grip_R_avg} kg</div></div>}
                    </div>
                  </div>
                </div>
                {assessForm.strength.grip_total_avg!=null&&<div className="g4">
                  <div className="kpi"><div className="label">Total Avg</div><div className="value" style={{color:'#747A4E'}}>{assessForm.strength.grip_total_avg}</div></div>
                  <div className="kpi"><div className="label">Asimetría</div><div className="value" style={{color:assessForm.strength.grip_asym_pct>10?'#C0392B':assessForm.strength.grip_asym_pct>5?'#D4901A':'#2D7A5E'}}>{assessForm.strength.grip_asym_pct}%</div></div>
                  <div className="kpi"><div className="label">Promedio L</div><div className="value">{assessForm.strength.grip_L_avg}</div></div>
                  <div className="kpi"><div className="label">Promedio R</div><div className="value">{assessForm.strength.grip_R_avg}</div></div>
                </div>}
              </div>}

              {/* 6. ENDURANCE / BALANCE */}
              {entryTab==='functional'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="fg2">
                  <Field label="Push-ups (reps)" value={assessForm.functional.pushup_reps} onChange={v=>setA('functional.pushup_reps',v)} type="number"/>
                  <Field label="Calidad push-up" value={assessForm.functional.pushup_quality} onChange={v=>setA('functional.pushup_quality',v)} as="select" options={['Full ROM','Partial ROM','Poor form']}/>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <input type="checkbox" checked={!!assessForm.functional.balance_required} onChange={e=>setA('functional.balance_required',e.target.checked)} id="balReq"/>
                  <label htmlFor="balReq" style={{fontSize:12,color:'var(--muted)',cursor:'pointer'}}>Activar Balance (automático para 60+)</label>
                </div>
                {assessForm.functional.balance_required&&<div className="fg2">
                  <Field label="Balance Izq." value={assessForm.functional.balance_l_sec} onChange={v=>setA('functional.balance_l_sec',v)} type="number" unit="seg"/>
                  <Field label="Balance Der." value={assessForm.functional.balance_r_sec} onChange={v=>setA('functional.balance_r_sec',v)} type="number" unit="seg"/>
                  <Field label="Balance Score" value={assessForm.functional.balance_score} onChange={v=>setA('functional.balance_score',v)} type="number" unit="/100"/>
                  <Field label="Protocolo" value={assessForm.functional.balance_notes} onChange={v=>setA('functional.balance_notes',v)}/>
                </div>}
              </div>}

              {/* 7. TARGETS */}
              {entryTab==='targets'&&<div className="fg2">
                <Field label="Inicio ciclo" value={assessForm.targets.target_date?assessForm.assessment_date:''} onChange={v=>setA('assessment_date',v)} type="date"/>
                <Field label="Fecha objetivo" value={assessForm.targets.target_date} onChange={v=>setA('targets.target_date',v)} type="date"/>
                <Field label="Target BF%" value={assessForm.targets.target_bf_pct} onChange={v=>setA('targets.target_bf_pct',v)} type="number" unit="%"/>
                <Field label="Target Músculo" value={assessForm.targets.target_muscle_kg} onChange={v=>setA('targets.target_muscle_kg',v)} type="number" unit="kg"/>
                <Field label="Target Bio Age" value={assessForm.targets.target_bio_age} onChange={v=>setA('targets.target_bio_age',v)} type="number"/>
                <Field label="Target VO₂" value={assessForm.targets.target_vo2} onChange={v=>setA('targets.target_vo2',v)} type="number" unit="ml/kg/min"/>
                <Field label="Target HR" value={assessForm.targets.target_hr} onChange={v=>setA('targets.target_hr',v)} type="number" unit="bpm"/>
                <Field label="Target BP" value={assessForm.targets.target_bp} onChange={v=>setA('targets.target_bp',v)} type="number" unit="mmHg sys"/>
                <Field label="Target Grip" value={assessForm.targets.target_grip} onChange={v=>setA('targets.target_grip',v)} type="number" unit="kg"/>
                <Field label="Target Push-ups" value={assessForm.targets.target_pushups} onChange={v=>setA('targets.target_pushups',v)} type="number" unit="reps"/>
                <Field label="Tipo progresión" value={assessForm.targets.progression_type} onChange={v=>setA('targets.progression_type',v)} as="select" options={['Horizontal','Vertical','Diagonal']}/>
              </div>}
              {entryTab==='targets'&&<Field label="Notas de estrategia" value={assessForm.targets.strategy_notes} onChange={v=>setA('targets.strategy_notes',v)} as="textarea"/>}

              {/* DIRECTION */}
              {entryTab==='direction'&&<div className="g2">
                <Field label="Diagnóstico" value={assessForm.direction.diagnosis} onChange={v=>setA('direction.diagnosis',v)} as="textarea"/>
                <Field label="Brecha" value={assessForm.direction.gap} onChange={v=>setA('direction.gap',v)} as="textarea"/>
                <Field label="Estrategia" value={assessForm.direction.strategy} onChange={v=>setA('direction.strategy',v)} as="textarea"/>
                <Field label="Recomendación" value={assessForm.direction.recommendation} onChange={v=>setA('direction.recommendation',v)} as="textarea"/>
              </div>}

              <div className="footer-actions" style={{marginTop:16}}>
                <button className="btn" onClick={()=>saveBlock(entryTab)} disabled={saving===entryTab}>{saving===entryTab?'Guardando...':'Guardar bloque'}</button>
                <button className="btn primary" onClick={finalizeAssessment}>✓ Completar evaluación</button>
                {assessForm&&<button className="btn danger" onClick={()=>deleteAssessment(assessForm.assessment_id)}>✕ Borrar evaluación</button>}
              </div>
            </div>
          </div>
        </>}

        {/* ═══ REVIEW ═══ */}
        {route==='/review'&&selectedClient&&selectedAssessment&&<>
          {/* Hero */}
          <div className="hero fade-up">
            <div className="card hero-copy">
              <div className="eyebrow">{selectedAssessment.category_final||selectedClient.category} · TEVA Review</div>
              <h2>{selectedClient.name}</h2>
              <p>El Review no explica todo — dirige. Estas métricas se priorizan según la categoría del cliente para transformar información en claridad, claridad en dirección y dirección en acción.</p>
              <div className="hero-meta">
                {[['Fecha',fmt(selectedAssessment.assessment_date)],['Coach',selectedClient.trainer||'—'],['Tipo',selectedAssessment.assessment_type],['vs anterior',prevAssessment?fmt(prevAssessment.assessment_date):'Primera sesión']].map(([k,v])=><div key={k} className="mini"><div className="k">{k}</div><div className="v" style={{fontSize:'clamp(13px,1.2vw,18px)'}}>{v}</div></div>)}
              </div>
            </div>
            <div className="card">
              <div className="card-head"><h3>Hero Metrics</h3><span className="small">Core {selectedAssessment.category_final}</span></div>
              <div className="card-body">
                <div className="g3">
                  {heroMetrics.map((m,i)=><div key={i} className="kpi"><div className="label">{m.label}</div><div className="value" style={{color:CAT_COL[selectedAssessment.category_final||selectedClient.category]}}>{m.value}</div><div className="small" style={{marginTop:6}}>{m.note}</div></div>)}
                </div>
                {selectedAssessment.direction?.diagnosis&&<div className="diag" style={{marginTop:12}}><div className="eyebrow">Diagnóstico</div><p>{selectedAssessment.direction.diagnosis}</p></div>}
              </div>
            </div>
          </div>

          {/* Body Composition */}
          <div className="g2 fade-up">
            <div className="card">
              <div className="card-head"><h3>Composición Corporal</h3><span className="small">Evolt 360</span></div>
              <div className="card-body">
                <div className="g4">
                  {[['Peso',selectedAssessment.body?.weight_kg,'kg'],['Músculo',selectedAssessment.body?.skeletal_muscle_kg,'kg'],['Grasa %',selectedAssessment.body?.body_fat_pct,'%'],['Bio Age',selectedAssessment.body?.bio_age,'']].map(([l,v,u])=><div key={l} className="metric"><div className="label">{l}</div><div className="value">{safe(v,'—')}{u&&<span style={{fontSize:12,color:'var(--soft)',marginLeft:2}}>{u}</span>}</div>{prevAssessment&&Number.isFinite(Number(v))&&Number.isFinite(Number(prevAssessment.body?.[Object.keys(selectedAssessment.body||{}).find(k=>selectedAssessment.body[k]==v)]))&&<div className="metric compare" style={{fontSize:11,color:'var(--soft)',marginTop:4}}>vs anterior</div>}</div>)}
                </div>
                <div className="line"/>
                <div className="seg-grid">
                  {[['left_arm','Brazo I'],['right_arm','Brazo D'],['trunk','Tronco'],['left_leg','Pierna I'],['right_leg','Pierna D']].map(([zone,label])=>{const seg=selectedAssessment.segmental?.[zone];return <div key={zone} className="seg"><h5>{label}</h5><div className="v">{safe(seg?.lean,'—')}<span style={{fontSize:10,color:'var(--soft)'}}>L</span></div><div style={{fontSize:13,color:'#D4901A',fontWeight:700,marginTop:2}}>{safe(seg?.fat,'—')}<span style={{fontSize:10,color:'var(--soft)'}}>F</span></div><span className={`badge ${String(seg?.state||'Normal').toLowerCase()==='over'?'burnt':String(seg?.state||'Normal').toLowerCase()==='under'?'reset':'hypert'}`}>{seg?.state||'Normal'}</span></div>;})}
                </div>
              </div>
            </div>

            {/* Strength */}
            <div className="card">
              <div className="card-head"><h3>Fuerza & Funcional</h3><span className="small">Handgrip + Endurance</span></div>
              <div className="card-body">
                <div className="g4">
                  {[['Grip L',selectedAssessment.strength?.grip_L_avg,'kg'],['Grip R',selectedAssessment.strength?.grip_R_avg,'kg'],['Grip Total',selectedAssessment.strength?.grip_total_avg,'kg'],['Asimetría',Number.isFinite(Number(selectedAssessment.strength?.grip_asym_pct))?`${selectedAssessment.strength.grip_asym_pct}%`:'—','']].map(([l,v,u])=><div key={l} className="metric"><div className="label">{l}</div><div className="value">{safe(v,'—')}{u&&<span style={{fontSize:11,color:'var(--soft)',marginLeft:2}}>{u}</span>}</div></div>)}
                </div>
                <div className="line"/>
                <div className="g3">
                  <div className="pmini"><div className="label">Push-ups</div><div className="value">{safe(selectedAssessment.functional?.pushup_reps,'—')}</div></div>
                  <div className="pmini"><div className="label">VO₂max Final</div><div className="value" style={{color:'#D4901A'}}>{safe(selectedAssessment.vo2?.vo2max_final||selectedAssessment.vo2?.vo2max_estimated,'—')}</div></div>
                  <div className="pmini"><div className="label">Blood Pressure</div><div className="value">{`${selectedAssessment.vitals?.systolic||'—'}/${selectedAssessment.vitals?.diastolic||'—'}`}</div></div>
                </div>
              </div>
            </div>
          </div>

          {/* Comparison chart */}
          <div className="card fade-up">
            <div className="card-head"><h3>Comparación</h3><span className="small">{prevAssessment?`${fmt(prevAssessment.assessment_date)} vs ${fmt(selectedAssessment.assessment_date)}`:'Sin sesión anterior'}</span></div>
            <div className="card-body"><div ref={compareRef} className="plot-sm"/></div>
          </div>

          {/* Smart Interpretation */}
          <div className="card fade-up">
            <div className="card-head"><h3>Interpretación inteligente</h3><span className="small">Lectura automática del cambio</span></div>
            <div className="card-body">
              {!interps.length?<div className="empty">Se necesita al menos una sesión previa para interpretar cambios.</div>
              :<div className="alist">{interps.map((item,idx)=><div key={idx} className="arow active">
                <div className="status-row" style={{justifyContent:'space-between'}}><strong>{item.label}</strong><span className={`badge ${item.tone==='positive'?'reset':'burnt'}`}>{item.tone==='positive'?'Positivo':'Alerta'}</span></div>
                <p style={{fontSize:12,color:'var(--muted)',marginTop:6,lineHeight:1.7}}>{item.text}</p>
                <div className="status-row" style={{marginTop:6}}><span className="pill">Δ {item.delta}</span><span className="pill">{item.pct>0?'+':''}{item.pct}%</span></div>
              </div>)}</div>}
            </div>
          </div>

          {/* Mobility */}
          <div className="card fade-up">
            <div className="card-head"><h3>Movilidad & Movimiento</h3><span className="small">Yogger · protocolo TEVA</span></div>
            <div className="card-body">
              <div className="g4" style={{marginBottom:14}}>
                {[['Movement',selectedAssessment.mobility?.movement_score],['Stability',selectedAssessment.mobility?.stability_score],['Mobility',selectedAssessment.mobility?.mobility_score],['Asymmetry',Number.isFinite(Number(selectedAssessment.mobility?.asymmetry_index))?`${selectedAssessment.mobility.asymmetry_index}%`:'—']].map(([l,v])=><div key={l} className="metric"><div className="label">{l}</div><div className="value">{safe(v,'—')}</div></div>)}
              </div>
              <div className="mob-layout">
                {/* Silhouette map */}
                <div>
                  <div className="sil-box">
                    <svg viewBox="0 0 320 500">
                      <g fill="rgba(187,196,212,.16)" stroke="rgba(255,255,255,.05)" strokeWidth="1.5">
                        <circle cx="160" cy="64" r="28"/><path d="M131 96 C115 110,110 138,115 160 L126 226 C128 240,138 250,149 255 L171 255 C182 250,192 240,194 226 L205 160 C210 138,205 110,189 96 Z"/><path d="M114 122 L81 214 C74 231,80 247,95 254 L111 259 L126 190 Z"/><path d="M206 122 L239 214 C246 231,240 247,225 254 L209 259 L194 190 Z"/><path d="M150 255 L137 364 C135 385,142 405,156 414 L160 416 L164 414 C178 405,185 385,183 364 L170 255 Z"/><path d="M137 364 L125 472 C124 481,130 488,139 488 L148 488 L154 419 Z"/><path d="M183 364 L195 472 C196 481,190 488,181 488 L172 488 L166 419 Z"/>
                      </g>
                      <g>
                        <circle className={`glow-r ${spot==='left_arm'?'active':''}`} cx="83" cy="205" r="34" fill="rgba(212,144,26,.45)"/>
                        <circle className={`glow-r ${spot==='right_arm'?'active':''}`} cx="237" cy="205" r="34" fill="rgba(212,144,26,.45)"/>
                        <rect className={`glow-r ${spot==='trunk'?'active':''}`} x="126" y="146" width="68" height="102" rx="20" fill="rgba(196,165,102,.44)"/>
                        <circle className={`glow-r ${spot==='left_leg'?'active':''}`} cx="136" cy="398" r="38" fill="rgba(116,122,78,.44)"/>
                        <circle className={`glow-r ${spot==='right_leg'?'active':''}`} cx="184" cy="398" r="38" fill="rgba(45,122,94,.44)"/>
                      </g>
                    </svg>
                    {[['left_arm','s1','OHS',selectedAssessment.mobility?.tests?.overhead_squat?.score],['right_arm','s2','SLS',selectedAssessment.mobility?.tests?.single_leg_squat?.score],['trunk','s3','Stand. Flex',selectedAssessment.mobility?.tests?.standing_flexion?.score],['left_leg','s4','Lunge',selectedAssessment.mobility?.tests?.forward_lunge?.score],['right_leg','s5','Movement',selectedAssessment.mobility?.movement_score]].map(([k,pos,label,val])=><div key={k} className={`spot ${pos} ${spot===k?'active':''}`} onClick={()=>setSpot(k)}><strong>{label}</strong>{safe(val,'—')}</div>)}
                  </div>
                  {(()=>{const m={left_arm:{label:'Overhead Squat',detail:'Movilidad global y control superior. Carga en cadena cinética.'},right_arm:{label:'Single-Leg Squat',detail:'Control unilateral y asimetría. Sensibilidad alta.'},trunk:{label:'Standing Flexion Trunk',detail:'Control del tronco y flexión global del sistema.'},left_leg:{label:'Forward Lunge',detail:'Patrón funcional unilateral en desplazamiento.'},right_leg:{label:'Movement Score',detail:'Síntesis global del output de movimiento.'}};const sel=m[spot];return <div className="diag" style={{marginTop:10}}><div className="eyebrow">{sel.label}</div><p>{sel.detail}</p></div>;})()}
                </div>
                {/* Radar */}
                <div>
                  <div className="radar-wrap"><MobilityRadar assessment={selectedAssessment}/></div>
                </div>
              </div>
            </div>
          </div>

          {/* Trends */}
          <div className="card fade-up">
            <div className="card-head"><h3>Tendencias</h3><span className="small">Histórico del cliente</span></div>
            <div className="card-body"><div ref={trendRef} className="plot"/></div>
          </div>

          {/* TEVA Direction */}
          <div className="card fade-up">
            <div className="card-head"><h3>TEVA Direction</h3><span className="small">Editable por el entrenador</span></div>
            <div className="card-body">
              {dirAssist&&<div className="diag" style={{marginBottom:14}}>
                <div className="eyebrow">Direction Assist — sugerencia automática</div>
                <p><strong>Diagnóstico:</strong> {dirAssist.diagnosis}</p>
                <p><strong>Brecha:</strong> {dirAssist.gap}</p>
                <p><strong>Estrategia:</strong> {dirAssist.strategy}</p>
                <p><strong>Recomendación:</strong> {dirAssist.recommendation}</p>
                <button className="btn" style={{marginTop:10}} onClick={()=>{const next=clone(selectedAssessment);next.direction={diagnosis:dirAssist.diagnosis,gap:dirAssist.gap,strategy:dirAssist.strategy,recommendation:dirAssist.recommendation};setDb(prev=>({...prev,assessments:prev.assessments.map(a=>a.assessment_id===next.assessment_id?next:a)}));setAssessForm(next);}}>Aplicar sugerencia</button>
              </div>}
              <div className="g2">
                {[['Diagnóstico','diagnosis'],['Brecha','gap'],['Estrategia','strategy'],['Recomendación','recommendation']].map(([l,k])=><Field key={k} label={l} value={selectedAssessment.direction?.[k]||''} onChange={v=>{const next=clone(selectedAssessment);next.direction[k]=v;setDb(prev=>({...prev,assessments:prev.assessments.map(a=>a.assessment_id===next.assessment_id?next:a)}));}} as="textarea"/>)}
              </div>
              <div className="footer-actions" style={{marginTop:12}}>
                <button className="btn primary" onClick={async()=>{const cur=db.assessments.find(a=>a.assessment_id===selectedAssessment.assessment_id);if(cur){await apiCall('batchUpsertRows',{rows:flattenRows(cur),assessment_id:cur.assessment_id});setStatus('Direction guardada.');}}}>Guardar Direction</button>
              </div>
            </div>
          </div>

          <div className="footer-actions no-print" style={{marginTop:4}}>
            <button className="btn" onClick={()=>{if(selectedAssessment){setAssessForm(clone(selectedAssessment));window.location.hash='/entry';}}}> Editar sesión</button>
            <button className="btn" onClick={loadData}>↻ Refresh</button>
            <button className="btn primary" onClick={()=>generatePDF(selectedClient,selectedAssessment,prevAssessment,interps)}>↓ Export PDF</button>
          </div>
        </>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
